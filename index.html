<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS SA Professional Prep</title>
    <script>
      // Restore the URL encoded by 404.html so React Router can match the route.
      (function (l) {
        if (l.search[1] === 'p') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .reduce(function (q, range) {
              var parts = range.split('=');
              q[parts[0]] = parts.slice(1).join('=').replace(/~and~/g, '&');
              return q;
            }, {});
          if (decoded.p !== undefined) {
            window.history.replaceState(
              null, null,
              l.protocol + '//' + l.host + '/' + decoded.p.replace(/%2F/gi, '/') +
              (decoded.q ? '?' + decoded.q : '') + l.hash
            );
          }
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
